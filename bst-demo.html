<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>二叉搜索树查找可视化</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #dae5ed 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* ===== 主容器 ===== */
        #app {
            max-width: 1160px;
            width: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 24px 28px 32px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.20);
            border: 1px solid rgba(255, 255, 255, 0.60);
            transition: all 0.2s;
        }

        /* ===== 头部 ===== */
        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            gap: 12px 16px;
        }
        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a2a3a;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #6b7f8f;
            margin-left: 4px;
        }

        /* ===== 控制区 ===== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .controls label {
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
        }
        .controls input[type="number"] {
            width: 100px;
            padding: 8px 14px;
            border: 2px solid #cfdde8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            background: #fff;
            color: #1a2a3a;
        }
        .controls input[type="number"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .controls button {
            padding: 8px 22px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, background 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .controls button:active {
            transform: scale(0.96);
        }
        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #searchBtn {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.30);
        }
        #searchBtn:hover:not(:disabled) {
            background: #2563eb;
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.40);
        }

        #resetBtn {
            background: #e8edf2;
            color: #2c3e50;
        }
        #resetBtn:hover:not(:disabled) {
            background: #d5dee8;
        }

        /* ===== 画布容器 ===== */
        .canvas-wrapper {
            position: relative;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 20, 40, 0.08);
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #ffffff;
            touch-action: none;
        }

        /* ===== 信息栏 ===== */
        .info-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px 20px;
            padding: 0 4px;
        }
        .status-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        #statusText {
            font-size: 15px;
            font-weight: 500;
            color: #1a2a3a;
            padding: 6px 16px;
            background: #f0f4f8;
            border-radius: 20px;
            border: 1px solid #e2e9f0;
            min-width: 80px;
            text-align: center;
            transition: background 0.3s, border-color 0.3s;
        }
        #statusText.ready {
            background: #f0f4f8;
            border-color: #e2e9f0;
        }
        #statusText.searching {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }
        #statusText.found {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        #statusText.notfound {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        #compareCount {
            font-size: 14px;
            color: #4b5e6f;
            font-weight: 500;
        }

        .inorder-area {
            font-size: 14px;
            color: #3d5265;
            background: #f7f9fb;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #e8edf2;
            max-width: 480px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .inorder-area span {
            font-weight: 600;
            color: #1a2a3a;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 780px) {
            #app {
                padding: 16px;
            }
            header h1 {
                font-size: 20px;
            }
            header h1 small {
                display: none;
            }
            .controls input[type="number"] {
                width: 80px;
            }
            .inorder-area {
                max-width: 200px;
                font-size: 13px;
            }
        }
        @media (max-width: 500px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .controls {
                justify-content: center;
            }
            .info-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .inorder-area {
                max-width: 100%;
                white-space: normal;
                overflow-x: visible;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- 头部 -->
        <header>
            <h1>
                🌳 二叉搜索树
                <small>查找可视化</small>
            </h1>
            <div class="controls">
                <label for="searchInput">🔎 查找</label>
                <input type="number" id="searchInput" placeholder="输入数字" min="1" max="200" />
                <button id="searchBtn">▶ 查找</button>
                <button id="resetBtn">🔄 重新生成</button>
            </div>
        </header>

        <!-- 画布 -->
        <div class="canvas-wrapper">
            <canvas id="treeCanvas" width="1100" height="600"></canvas>
        </div>

        <!-- 信息栏 -->
        <div class="info-bar">
            <div class="status-area">
                <span id="statusText" class="ready">就绪 ✅</span>
                <span id="compareCount">比较次数：0</span>
            </div>
            <div class="inorder-area">
                📋 中序遍历：<span id="inorderText">—</span>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  1. 工具函数
        // ================================================================

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        /** 生成 n 个 [min, max] 区间的不重复随机整数 */
        function randomUniqueInts(n, min, max) {
            if (max - min + 1 < n) throw new Error('范围太小');
            const pool = [];
            for (let i = min; i <= max; i++) pool.push(i);
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            return pool.slice(0, n);
        }

        // ================================================================
        //  2. BST 核心
        // ================================================================

        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.x = 0; // 画布坐标
                this.y = 0;
                // 用于动画的状态
                this.state = 'default'; // default | visited | current | found | notFound
            }
        }

        class BST {
            constructor() {
                this.root = null;
                this.size = 0;
                this._inorderCache = [];
            }

            insert(value) {
                const node = new Node(value);
                if (!this.root) {
                    this.root = node;
                    this.size = 1;
                    return;
                }
                let cur = this.root;
                while (true) {
                    if (value < cur.value) {
                        if (!cur.left) { cur.left = node;
                            this.size++; return; }
                        cur = cur.left;
                    } else if (value > cur.value) {
                        if (!cur.right) { cur.right = node;
                            this.size++; return; }
                        cur = cur.right;
                    } else {
                        return; // 重复不插入
                    }
                }
            }

            /** 批量插入 */
            fromArray(arr) {
                for (const v of arr) this.insert(v);
            }

            /** 中序遍历（返回有序数组） */
            inorder(node = this.root, acc = []) {
                if (!node) return acc;
                this.inorder(node.left, acc);
                acc.push(node.value);
                this.inorder(node.right, acc);
                return acc;
            }

            /** 获取查找路径：数组 { node, type }  type: 'visit' | 'found' | 'notFound' */
            getSearchPath(target) {
                const path = [];
                let cur = this.root;
                while (cur) {
                    if (target === cur.value) {
                        path.push({ node: cur, type: 'found' });
                        return path;
                    }
                    path.push({ node: cur, type: 'visit' });
                    if (target < cur.value) {
                        cur = cur.left;
                    } else {
                        cur = cur.right;
                    }
                }
                // 未找到：最后访问的节点标记 notFound
                if (path.length > 0) {
                    path[path.length - 1].type = 'notFound';
                }
                return path;
            }

            /** 重置所有节点状态 */
            resetStates() {
                const walk = (n) => {
                    if (!n) return;
                    n.state = 'default';
                    walk(n.left);
                    walk(n.right);
                };
                walk(this.root);
            }

            /** 获取树的最大深度 */
            getDepth(node = this.root) {
                if (!node) return 0;
                return 1 + Math.max(this.getDepth(node.left), this.getDepth(node.right));
            }
        }

        // ================================================================
        //  3. 布局算法（区间分割法）
        // ================================================================

        function calculateLayout(tree, canvasWidth, canvasHeight) {
            const root = tree.root;
            if (!root) return;

            const paddingX = 55;
            const paddingY = 50;
            const depth = tree.getDepth();
            const vertSpacing = Math.min(110, (canvasHeight - paddingY * 2) / Math.max(depth, 1));
            const usableWidth = canvasWidth - 2 * paddingX;

            // ── Pass 1: Inorder traversal → assign uniform preliminary x ──
            const inorderList = [];
            function inorderCollect(node) {
                if (!node) return;
                inorderCollect(node.left);
                inorderList.push(node);
                inorderCollect(node.right);
            }
            inorderCollect(root);

            const n = inorderList.length;
            inorderList.forEach((node, i) => {
                node._prelimX = paddingX + (i / (n - 1 || 1)) * usableWidth;
            });

            // ── Assign depth (y coordinate) ──
            function setDepth(node, d) {
                if (!node) return;
                node._depth = d;
                setDepth(node.left, d + 1);
                setDepth(node.right, d + 1);
            }
            setDepth(root, 0);

            // ── Pass 2: Post-order — center parent between children ──
            function centerParent(node) {
                if (!node) return;
                centerParent(node.left);
                centerParent(node.right);

                if (node.left && node.right) {
                    node.x = (node.left.x + node.right.x) / 2;
                } else if (node.left) {
                    node.x = (node._prelimX + node.left.x) / 2;
                } else if (node.right) {
                    node.x = (node._prelimX + node.right.x) / 2;
                } else {
                    node.x = node._prelimX;
                }
                node.y = paddingY + node._depth * vertSpacing + 30;
            }
            centerParent(root);

            // ── Pass 3: Conflict resolution — enforce minimum horizontal gap ──
            const minGap = NODE_RADIUS * 2.5;
            const byDepth = {};
            function collectByDepth(node) {
                if (!node) return;
                const key = node._depth;
                if (!byDepth[key]) byDepth[key] = [];
                byDepth[key].push(node);
                collectByDepth(node.left);
                collectByDepth(node.right);
            }
            collectByDepth(root);

            // Sort each depth level by x and shift to enforce min gap
            Object.values(byDepth).forEach(nodes => {
                nodes.sort((a, b) => a.x - b.x);
                for (let i = 1; i < nodes.length; i++) {
                    const gap = nodes[i].x - nodes[i - 1].x;
                    if (gap < minGap) {
                        const shift = minGap - gap;
                        for (let j = i; j < nodes.length; j++) {
                            nodes[j].x += shift;
                        }
                    }
                }
            });

            // ── Pass 4: Re-center parents after conflict resolution ──
            function recenter(node) {
                if (!node) return;
                recenter(node.left);
                recenter(node.right);
                if (node.left && node.right) {
                    node.x = (node.left.x + node.right.x) / 2;
                }
                // Clamp to canvas bounds
                const margin = NODE_RADIUS + 5;
                node.x = Math.max(paddingX + margin, Math.min(canvasWidth - paddingX - margin, node.x));
            }
            recenter(root);

            // Clean up temporary properties
            function cleanup(node) {
                if (!node) return;
                delete node._prelimX;
                delete node._depth;
                cleanup(node.left);
                cleanup(node.right);
            }
            cleanup(root);
        }
        //  4. 绘制引擎
        // ================================================================

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        // 尺寸参数
        const NODE_RADIUS = 23;
        const ARROW_HEAD_LEN = 10;
        const ARROW_ANGLE = Math.PI / 7;

        // 颜色表
        const COLORS = {
            default: {
                fill: '#ffffff',
                stroke: '#94a3b8',
                text: '#1e293b',
            },
            visited: {
                fill: '#bfdbfe',
                stroke: '#3b82f6',
                text: '#1e3a8a',
            },
            current: {
                fill: '#3b82f6',
                stroke: '#1d4ed8',
                text: '#ffffff',
            },
            found: {
                fill: '#10b981',
                stroke: '#059669',
                text: '#ffffff',
            },
            notFound: {
                fill: '#ef4444',
                stroke: '#dc2626',
                text: '#ffffff',
            },
        };

        /** 获取节点当前应使用的颜色配置 */
        function getNodeColors(node) {
            const s = node.state || 'default';
            if (COLORS[s]) return COLORS[s];
            return COLORS.default;
        }

        /** 绘制单个节点（不含光环） */
        function drawNodeBody(node, scale = 1) {
            const { x, y } = node;
            const r = NODE_RADIUS * scale;
            const colors = getNodeColors(node);

            // 阴影
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.06)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 2;

            // 填充
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = colors.fill;
            ctx.fill();

            // 边框
            ctx.shadowColor = 'transparent';
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = colors.stroke;
            ctx.stroke();
            ctx.restore();

            // 文字
            const fontSize = node.value >= 100 ? 15 : 17;
            ctx.font = `600 ${fontSize}px 'Segoe UI', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = colors.text;
            ctx.fillText(String(node.value), x, y + 0.5);
        }

        /** 绘制闪烁光环（用于 current / found / notFound 状态） */
        function drawGlow(node, time, pulseSpeed = 5) {
            const s = node.state;
            if (s !== 'current' && s !== 'found' && s !== 'notFound') return;

            const { x, y } = node;
            const baseR = NODE_RADIUS + 6;
            const pulse = 0.5 + 0.5 * Math.sin(time * pulseSpeed * 0.001);
            const glowR = baseR + pulse * 8;
            const alpha = 0.25 + 0.2 * pulse;

            let color;
            if (s === 'current') color = `rgba(59, 130, 246, ${alpha})`;
            else if (s === 'found') color = `rgba(16, 185, 129, ${alpha})`;
            else color = `rgba(239, 68, 68, ${alpha})`;

            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, glowR, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // 外发光描边
            ctx.beginPath();
            ctx.arc(x, y, glowR + 2, 0, Math.PI * 2);
            ctx.strokeStyle = color.replace(/[\d.]+\)$/, Math.min(alpha + 0.1, 0.5) + ')');
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        }

        /** 绘制从父节点到子节点的箭头连线 */
        function drawArrow(parent, child) {
            const dx = child.x - parent.x;
            const dy = child.y - parent.y;
            const angle = Math.atan2(dy, dx);
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) return;

            const r = NODE_RADIUS;
            // 起点（父节点边缘）
            const startX = parent.x + r * Math.cos(angle);
            const startY = parent.y + r * Math.sin(angle);
            // 终点（子节点边缘）
            const endX = child.x - r * Math.cos(angle);
            const endY = child.y - r * Math.sin(angle);

            // 绘制连线
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.stroke();

            // 绘制箭头（三角形）
            const headLen = ARROW_HEAD_LEN;
            const headAngle = ARROW_ANGLE;
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(
                endX - headLen * Math.cos(angle - headAngle),
                endY - headLen * Math.sin(angle - headAngle)
            );
            ctx.lineTo(
                endX - headLen * Math.cos(angle + headAngle),
                endY - headLen * Math.sin(angle + headAngle)
            );
            ctx.closePath();
            ctx.fillStyle = '#94a3b8';
            ctx.fill();
            ctx.restore();
        }

        /** 递归绘制所有连线 */
        function drawArrows(node) {
            if (!node) return;
            if (node.left) {
                drawArrow(node, node.left);
                drawArrows(node.left);
            }
            if (node.right) {
                drawArrow(node, node.right);
                drawArrows(node.right);
            }
        }

        /** 递归绘制所有节点 */
        function drawNodes(node, time) {
            if (!node) return;
            // 先绘制子节点（让父节点在上层）
            drawNodes(node.left, time);
            drawNodes(node.right, time);

            // 绘制光环
            drawGlow(node, time);

            // 绘制节点本体
            const s = node.state;
            let scale = 1;
            if (s === 'current' || s === 'found' || s === 'notFound') {
                const pulse = 0.5 + 0.5 * Math.sin(time * 6 * 0.001);
                scale = 1 + 0.06 * pulse;
            }
            drawNodeBody(node, scale);
        }

        /** 主绘制函数 */
        function renderTree(time = 0) {
            const rect = canvas.getBoundingClientRect();
            // 保证 canvas 像素尺寸与 CSS 尺寸匹配（适配高清）
            const dpr = window.devicePixelRatio || 1;
            const displayWidth = canvas.clientWidth;
            const displayHeight = canvas.clientHeight;
            if (canvas.width !== displayWidth * dpr || canvas.height !== displayHeight * dpr) {
                canvas.width = displayWidth * dpr;
                canvas.height = displayHeight * dpr;
                ctx.scale(dpr, dpr);
            }

            // 清空
            ctx.clearRect(0, 0, displayWidth, displayHeight);

            // 绘制网格背景（极淡）
            ctx.save();
            ctx.strokeStyle = 'rgba(0,0,0,0.02)';
            ctx.lineWidth = 1;
            for (let x = 0; x < displayWidth; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, displayHeight);
                ctx.stroke();
            }
            for (let y = 0; y < displayHeight; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(displayWidth, y);
                ctx.stroke();
            }
            ctx.restore();

            const root = bst?.root;
            if (!root) {
                ctx.save();
                ctx.font = '600 18px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#94a3b8';
                ctx.fillText('🌱 树为空，点击「重新生成」创建 BST', displayWidth / 2, displayHeight / 2);
                ctx.restore();
                return;
            }

            // 先画箭头（在节点下方）
            drawArrows(root);
            // 再画节点
            drawNodes(root, time);
        }

        /** 自适应画布大小 & 重排 */
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const wrapperWidth = wrapper.clientWidth;
            // 保持宽高比 1100:600
            const aspect = 1100 / 600;
            let w = wrapperWidth;
            let h = w / aspect;
            // 最大高度限制
            const maxH = window.innerHeight * 0.55;
            if (h > maxH) {
                h = maxH;
                w = h * aspect;
            }
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            // 重新布局（使用展示尺寸）
            const displayW = canvas.clientWidth;
            const displayH = canvas.clientHeight;
            if (bst && bst.root) {
                calculateLayout(bst, displayW, displayH);
            }
            renderTree(0);
        }

        // ================================================================
        //  5. 动画控制
        // ================================================================

        let bst = new BST();
        let animationRunning = false;
        let animationId = null;
        let currentTime = 0;

        /** 动画循环（用于闪烁效果） */
        function animationLoop(time) {
            currentTime = time;
            renderTree(time);
            if (animationRunning) {
                animationId = requestAnimationFrame(animationLoop);
            }
        }

        function startAnimationLoop() {
            if (animationRunning) return;
            animationRunning = true;
            animationId = requestAnimationFrame(animationLoop);
        }

        function stopAnimationLoop() {
            animationRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            // 最终绘制一次（不带时间参数，无闪烁）
            renderTree(0);
        }

        // ================================================================
        //  6. 查找动画（核心）
        // ================================================================

        const statusText = document.getElementById('statusText');
        const compareCount = document.getElementById('compareCount');
        const inorderText = document.getElementById('inorderText');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');

        async function performSearch(target) {
            if (!bst.root) {
                statusText.textContent = '树为空 ⚠️';
                statusText.className = 'ready';
                return;
            }

            // 禁用控件
            searchBtn.disabled = true;
            resetBtn.disabled = true;
            searchInput.disabled = true;

            // 重置状态
            bst.resetStates();
            const path = bst.getSearchPath(target);

            if (path.length === 0) {
                // 树为空的情况
                statusText.textContent = '树为空 ⚠️';
                statusText.className = 'ready';
                compareCount.textContent = '比较次数：0';
                searchBtn.disabled = false;
                resetBtn.disabled = false;
                searchInput.disabled = false;
                return;
            }

            // 启动动画循环
            startAnimationLoop();

            statusText.textContent = '搜索中…';
            statusText.className = 'searching';

            let compareNum = 0;

            for (let i = 0; i < path.length; i++) {
                const step = path[i];
                const node = step.node;

                // 标记之前访问的节点为 visited
                if (i > 0 && path[i - 1].node !== node) {
                    path[i - 1].node.state = 'visited';
                }

                // 标记当前节点
                if (step.type === 'found') {
                    node.state = 'found';
                    compareNum++;
                    compareCount.textContent = `比较次数：${compareNum}`;
                    statusText.textContent = `✅ 找到 ${target}！`;
                    statusText.className = 'found';
                    // 停留展示
                    await sleep(900);
                    break;
                } else if (step.type === 'notFound') {
                    node.state = 'notFound';
                    compareNum++;
                    compareCount.textContent = `比较次数：${compareNum}`;
                    statusText.textContent = `❌ 未找到 ${target}`;
                    statusText.className = 'notfound';
                    // 让最后一个访问的节点显示为 visited，然后将它改为 notFound
                    // 但 path 中最后一项 type 是 notFound，需要特殊处理
                    // 前面的节点已经标记为 visited，最后一个标记为 notFound
                    await sleep(900);
                    break;
                } else {
                    // visit 状态
                    node.state = 'current';
                    compareNum++;
                    compareCount.textContent = `比较次数：${compareNum}`;
                    statusText.textContent = `🔍 访问节点 ${node.value} ...`;
                    await sleep(580);
                    // 改为 visited（但如果是最后一个且是 visit 类型，后面会处理）
                    if (i === path.length - 1) {
                        // 这种情况不应该发生，但防御
                        node.state = 'visited';
                    }
                }
            }

            // 如果路径中最后一个节点仍是 current，改为 visited
            // 但 found/notFound 已经在循环中处理了
            // 额外处理：如果循环正常结束（没找到，但 path 最后不是 notFound？不会发生）
            // 确保最后一个节点状态正确
            if (path.length > 0) {
                const last = path[path.length - 1];
                if (last.type === 'visit' && last.node.state === 'current') {
                    last.node.state = 'visited';
                }
            }

            // 如果没找到（path 最后不是 found），显示未找到
            const lastStep = path[path.length - 1];
            if (lastStep && lastStep.type === 'notFound') {
                // 已经处理了
            } else if (lastStep && lastStep.type === 'found') {
                // 已经处理了
            } else {
                // 兜底
                statusText.textContent = `未找到 ${target}`;
                statusText.className = 'notfound';
            }

            // 再保留一会儿，然后停止动画
            await sleep(500);
            stopAnimationLoop();

            // 恢复控件
            searchBtn.disabled = false;
            resetBtn.disabled = false;
            searchInput.disabled = false;
            searchInput.focus();
            searchInput.select();
        }

        // ================================================================
        //  7. UI 事件绑定
        // ================================================================

        /** 重新生成 BST */
        function generateNewTree() {
            if (animationRunning) {
                stopAnimationLoop();
            }

            // Retry up to 5 times to get a reasonably balanced tree
            let bestTree = null;
            let bestDepth = Infinity;

            for (let attempt = 0; attempt < 5; attempt++) {
                const candidate = new BST();
                const values = randomUniqueInts(15, 1, 200);
                candidate.fromArray(values);
                const d = candidate.getDepth();
                if (d < bestDepth) {
                    bestDepth = d;
                    bestTree = candidate;
                }
                if (d <= 7) break; // depth ≤ 7 is good enough for 15 nodes
            }

            bst = bestTree;

            // 重置状态
            bst.resetStates();

            // 布局
            const displayW = canvas.clientWidth || 1100;
            const displayH = canvas.clientHeight || 600;
            calculateLayout(bst, displayW, displayH);

            // 更新中序遍历
            const inorder = bst.inorder();
            inorderText.textContent = inorder.join(' → ');

            // 重置状态显示
            statusText.textContent = '就绪 ✅';
            statusText.className = 'ready';
            compareCount.textContent = '比较次数：0';
            searchInput.value = '';
            searchInput.disabled = false;
            searchBtn.disabled = false;
            resetBtn.disabled = false;

            // 绘制
            renderTree(0);
        }

        /** 开始查找 */
        async function onSearch() {
            const val = parseInt(searchInput.value);
            if (isNaN(val)) {
                statusText.textContent = '请输入数字 ⚠️';
                statusText.className = 'ready';
                return;
            }
            if (!bst.root) {
                statusText.textContent = '树为空，请先生成 ⚠️';
                statusText.className = 'ready';
                return;
            }
            await performSearch(val);
        }

        // 查找按钮
        searchBtn.addEventListener('click', onSearch);

        // 回车触发查找
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !searchBtn.disabled) {
                onSearch();
            }
        });

        // 重置按钮
        resetBtn.addEventListener('click', generateNewTree);

        // 窗口自适应
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (bst && bst.root) {
                    const displayW = canvas.clientWidth || 1100;
                    const displayH = canvas.clientHeight || 600;
                    calculateLayout(bst, displayW, displayH);
                }
                renderTree(0);
            }, 120);
        });

        // ================================================================
        //  8. 初始化
        // ================================================================

        // 首次自适应
        setTimeout(() => {
            resizeCanvas();
        }, 20);

        // 生成初始树
        generateNewTree();

        // 额外：窗口加载完成后再调整一次
        window.addEventListener('load', () => {
            resizeCanvas();
        });

        // ================================================================
        //  导出（调试用）
        // ================================================================
        console.log('🌳 BST Demo 已加载！输入 bst 查看树结构。');
    </script>

</body>
